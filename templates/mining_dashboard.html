<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHASE-LOCK: Holographic Mining Manifold</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent: #f7931a;
            /* Bitcoin Orange */
            --bg: #050508;
            --card-bg: rgba(20, 20, 30, 0.8);
            --glitch-cyan: #00f3ff;
            --glitch-magenta: #ff00ff;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            color: white;
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 2rem;
            box-sizing: border-box;
            background: radial-gradient(circle at center, transparent 0%, rgba(5, 5, 8, 0.4) 100%);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .title-block {
            border-left: 4px solid var(--accent);
            padding-left: 1.5rem;
        }

        h1 {
            margin: 0;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: -1px;
            text-transform: uppercase;
            color: #fff;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent);
            opacity: 0.8;
        }

        .stats-grid {
            pointer-events: all;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(247, 147, 26, 0.2);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }

        .value {
            font-size: 2rem;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
        }

        .unit {
            font-size: 0.8rem;
            color: #555;
            margin-left: 0.5rem;
        }

        .lock-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 243, 255, 0.1);
            border: 1px solid var(--glitch-cyan);
            color: var(--glitch-cyan);
        }

        .lock-indicator.locked {
            background: rgba(0, 255, 100, 0.1);
            border-color: #00ff64;
            color: #00ff64;
        }

        #qc-report {
            position: absolute;
            top: 10rem;
            right: 2rem;
            width: 300px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            background: rgba(10, 10, 15, 0.9);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #aaa;
            max-height: 400px;
            overflow-y: auto;
        }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(to bottom, transparent, rgba(247, 147, 26, 0.05), transparent);
            position: absolute;
            top: -100px;
            left: 0;
            pointer-events: none;
            animation: scan 4s linear infinite;
            z-index: 100;
        }

        @keyframes scan {
            from {
                top: -100px;
            }

            to {
                top: 110%;
            }
        }

        @media (max-width: 900px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="scanline"></div>
    <div id="canvas-container"></div>

    <div class="overlay">
        <div class="header">
            <div class="title-block">
                <h1>Spectral Manifold</h1>
                <div class="subtitle">BITAXE HOLOGRAPHIC MINING ENGINE v2.0 // BM1366 OPTIMIZED</div>
            </div>
            <div id="lock-status" class="lock-indicator">SEARCHING FOR PHASE LOCK...</div>
        </div>

        <div id="qc-report">
            <div style="color: var(--accent); margin-bottom: 0.5rem;">[FIRST_PRINCIPLES_AUDIT]</div>
            <div id="qc-content">Initializing entropy bridge...</div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <div class="label">Spectral Hashrate</div>
                <div class="value" id="val-hashrate">0.00 <span class="unit">TH/s</span></div>
            </div>
            <div class="card">
                <div class="label">Thermodynamic Eff.</div>
                <div class="value" id="val-efficiency">0.00 <span class="unit">J/TH</span></div>
            </div>
            <div class="card">
                <div class="label">Core Temp</div>
                <div class="value" id="val-temp">0.0 <span class="unit">°C</span></div>
            </div>
            <div class="card">
                <div class="label">Power Dissipation</div>
                <div class="value" id="val-power">0.0 <span class="unit">W</span></div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls, points, shell;
        const POINT_COUNT = 100;
        let dataPoints = [];

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(50, 50, 50);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;

            // Grid / Axes
            const grid = new THREE.GridHelper(100, 20, 0x333333, 0x111111);
            scene.add(grid);

            // Theoretical Efficiency Shell (A transparent sphere representing the physical limit)
            const shellGeom = new THREE.SphereGeometry(30, 32, 32);
            const shellMat = new THREE.MeshBasicMaterial({
                color: 0xf7931a, wireframe: true, transparent: true, opacity: 0.05
            });
            shell = new THREE.Mesh(shellGeom, shellMat);
            scene.add(shell);

            // Points
            const dotGeom = new THREE.BufferGeometry();
            const dotMat = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 1 });
            points = new THREE.Points(dotGeom, dotMat);
            scene.add(points);

            animate();
            fetchData();
            setInterval(fetchData, 3000);
        }

        function updatePoints(data) {
            if (!data.points) return;

            const positions = [];
            const colors = [];
            const color = new THREE.Color();

            data.points.forEach(p => {
                // Map Temp(x), Hashrate(y), Power(z) to 3D space
                // Normalizing to roughly 0-100 range
                const x = (p.x - 30) * 2; // Temp (centered around 50)
                const y = (p.y) * 10;     // Hashrate
                const z = (p.z - 10) * 3; // Power

                positions.push(x, y, z);

                // Color based on efficiency deviation
                const dev = (p.efficiency - 17.0) / 17.0;
                if (dev < 0.1) color.setHex(0x00ff64); // Good
                else if (dev < 0.3) color.setHex(0xf7931a); // Warning
                else color.setHex(0xff3300); // Critical

                colors.push(color.r, color.g, color.b);
            });

            points.geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            points.geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;

            // Update UI
            document.getElementById('val-hashrate').innerHTML = data.current.hashrate.toFixed(2) + ' <span class="unit">TH/s</span>';
            document.getElementById('val-efficiency').innerHTML = data.current.efficiency.toFixed(2) + ' <span class="unit">J/TH</span>';
            document.getElementById('val-temp').innerHTML = data.current.temp.toFixed(1) + ' <span class="unit">°C</span>';
            document.getElementById('val-power').innerHTML = data.current.power.toFixed(1) + ' <span class="unit">W</span>';

            const lock = document.getElementById('lock-status');
            lock.innerText = 'PHASE LOCK: ' + data.current.phase_lock;
            if (data.current.phase_lock === 'LOCKED' || data.current.phase_lock === 'SUPER-CONDUCTIVE') {
                lock.classList.add('locked');
            } else {
                lock.classList.remove('locked');
            }
        }

        async function fetchData() {
            try {
                const r = await fetch('/api/manifold');
                const data = await r.json();
                updatePoints(data);

                const qcR = await fetch('/api/qc');
                const qcData = await qcR.json();
                document.getElementById('qc-content').innerHTML = `
                    Chip: ${qcData.holographic_audit.chipset}<br>
                    Diff: ${qcData.holographic_audit.metrics.efficiency_deviation.toFixed(2)}%<br>
                    Status: <span style="color:white">${qcData.holographic_audit.status}</span><br>
                    Entropy: OK
                `;
            } catch (e) {
                console.error("API link broken:", e);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            if (shell) shell.rotation.y += 0.005;
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>

</html>
